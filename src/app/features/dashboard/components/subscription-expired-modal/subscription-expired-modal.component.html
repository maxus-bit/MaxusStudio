<div class="modal-overlay" [class.open]="visible" (click)="onOverlayClick($event)">
  <div class="modal-window subscription-expired-modal" style="max-width: 500px;">
    <button class="modal-close" (click)="onClose()">&times;</button>
    <div class="modal-content">
      <div class="modal-icon">
        <i class="fa-solid fa-triangle-exclamation"></i>
      </div>
      <h2>Subscription Expired</h2>
      <p>Your subscription period has ended. To continue generating thumbnails, please renew your subscription plan.</p>
      <div class="modal-actions">
        <button class="btn btn-outline" (click)="onClose()">Close</button>
        <button class="btn btn-primary" (click)="onGoToPlans()">Go to Plans</button>
      </div>
    </div>
  </div>
</div>
