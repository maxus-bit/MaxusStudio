<div class="modal-overlay" *ngIf="visible" (click)="onClose()">
  <div class="modal-window settings-modal" (click)="$event.stopPropagation()">
    <button class="modal-close" (click)="onClose()">&times;</button>
    
    <div class="modal-header">
      <h2>Settings</h2>
    </div>

    <div class="settings-tabs">
      <button 
        class="tab-btn" 
        [class.active]="currentTab === 'profile'"
        (click)="currentTab = 'profile'"
      >
        Profile
      </button>
      <button 
        class="tab-btn" 
        [class.active]="currentTab === 'account'"
        (click)="currentTab = 'account'"
      >
        Account
      </button>
    </div>

    <div class="settings-content">
      <!-- Profile Tab -->
      <div class="tab-content" *ngIf="currentTab === 'profile'">
        <div class="setting-item">
          <label>Email</label>
          <input type="email" [(ngModel)]="email" [disabled]="isUpdating">
          <button class="btn btn-primary" (click)="onUpdateEmail()" [disabled]="isUpdating">
            Update Email
          </button>
        </div>

        <div class="setting-item">
            <label>Legal</label>
            <a [routerLink]="['/privacy']" (click)="onClose()" class="privacy-btn">
                Privacy Policy <i class="fa-solid fa-arrow-up-right-from-square"></i>
            </a>
        </div>

        <div class="setting-item danger-zone">
          <h3>Delete Account</h3>
          <p>Once you delete your account, there is no going back. Please be certain.</p>
          <button class="btn btn-danger" (click)="onDeleteAccount()" [disabled]="isUpdating">
            Delete Account
          </button>
        </div>
      </div>

      <!-- Account Tab -->
      <div class="tab-content" *ngIf="currentTab === 'account'">
        <div class="setting-item">
          <label>New Password</label>
          <input type="password" [(ngModel)]="newPassword" placeholder="Min. 6 characters" [disabled]="isUpdating">
          <label>Confirm Password</label>
          <input type="password" [(ngModel)]="confirmPassword" placeholder="Confirm new password" [disabled]="isUpdating">
          <button class="btn btn-primary" (click)="onUpdatePassword()" [disabled]="isUpdating">
            Update Password
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
